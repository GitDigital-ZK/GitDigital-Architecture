name: GitDigital Polyglot CI
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # --- STAGE 1: Low-Level Crypto (Zig) ---
  build-zk-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.11.0
      - name: Build Shared Crypto Lib
        run: zig build -Doptimize=ReleaseFast

  # --- STAGE 2: AI & Prover Logic (Mojo & Julia) ---
  build-compute-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Mojo
        run: |
          curl -ssL https://get.modular.com | sh -
          modular auth ${{ secrets.MODULAR_AUTH_TOKEN }}
          modular install mojo
      - name: Julia Math Validation
        uses: julia-actions/setup-julia@v1
      - run: julia --project=analysis/ -e 'using Pkg; Pkg.instantiate(); Pkg.test()'

  # --- STAGE 3: Backend & Integration (Go & Ballerina) ---
  build-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Setup Ballerina
        run: |
          curl -L https://dist.ballerina.io/downloads/2201.8.0/ballerina-2201.8.0-swan-lake-linux-x64.deb -o ballerina.deb
          sudo dpkg -i ballerina.deb
      - run: ballerina build services/gateway/

  # --- STAGE 4: Mobile Client (Android & V) ---
  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install V-Lang
        run: |
          git clone https://github.com/vlang/v
          cd v && make && sudo ./v symlink
      - run: cd mobile/ && ./gradlew assembleRelease
